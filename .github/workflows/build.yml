name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'any'
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get
        working-directory: voluntraq_frontend

      - name: Build APK
        run: flutter build apk --release
        working-directory: voluntraq_frontend

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: voluntraq-release-apk
          path: voluntraq_frontend/build/app/outputs/flutter-apk/app-release.apk
